<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
        Why include these meta tags in almost every project?
        - charset=UTF-8: Ensures special characters (like Persian, emojis, accents) display correctly
        - viewport: Prevents mobile browsers from zooming out oddly → makes page responsive by default
        Without them → text may look broken on phones or with non-English content
    -->
    <title>Book Store</title>
</head>
<body>
    <h1>Book Store</h1>

    <!-- 
        External JS file: Keeps HTML clean (structure only) and JS separate (behavior only)
        Why place <script> at the end of <body>?
        → HTML content loads & renders first → page feels faster
        → DOM elements (like future buttons/inputs) exist when JS runs
    -->
    <script src="app.js"></script>
</body>
</html>
