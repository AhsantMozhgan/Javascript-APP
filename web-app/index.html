<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
        These two meta tags are now standard best practice in 2025–2026
        - charset=UTF-8 → handles Persian/Farsi, Arabic, emojis, etc. correctly
        - viewport → mobile devices display page at proper scale (no awkward zoom)
    -->
    <title>Book Store</title>
</head>
<body>
    <h1>Book Store</h1>

    <!-- 
        Why <script> at bottom of body (not in head)?
        1. HTML renders first → user sees content faster (better perceived performance)
        2. DOM is fully built when JS runs → no need for DOMContentLoaded / window.onload
        3. Separation of concerns: HTML = structure, JS = behavior
    -->
    <script src="app.js"></script>
</body>
</html>
