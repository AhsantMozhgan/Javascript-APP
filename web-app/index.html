<!DOCTYPE html>
<html>
    <head>
        <title>Book Store</title>
        <!-- 
            Why no <meta charset="UTF-8"> and <meta name="viewport">?
            → For very simple local learning projects it's not strictly required,
            → but in real-world apps these two lines prevent garbled text (especially Persian/Farsi) 
               and make the page look correct on mobile phones.
            → You can safely add them later without breaking anything.
        -->
    </head>
    <body>
        <h1>Book Store</h1>

        <!-- Search field: allows live filtering of the product list -->
        <input type="text" id="search-products" placeholder="Search...">
        <!-- 
            Why id="search-products"?
            → Clear, descriptive name → easy to select with document.querySelector later
            Why placeholder?
            → Gives hint to user what to do → improves usability
        -->

        <!-- Checkbox to toggle "show only available (exist: true) products" -->
        <label>
            <input type="checkbox" id="available-products">Available Products
            <!--
                Why <label> wraps the input + text?
                → Clicking the text also toggles the checkbox → better accessibility & UX
                Why id on checkbox?
                → Lets us easily listen for changes in JavaScript
            -->
        </label>

        <!-- Container where filtered product titles will appear dynamically -->
        <div id="products"></div>
        <!-- 
            Why empty <div> with id?
            → Acts as a placeholder → JavaScript will insert <p> elements here
            → Using id makes it very easy to target with querySelector
        -->

        <!-- Form for adding new products -->
        <form id="add-product-form">
            <input type="text" name="productTitle" placeholder="Add Product...">
            <!--
                Why name="productTitle"?
                → Allows easy access via e.target.elements.productTitle in submit handler
                Why no required attribute?
                → Optional here, but adding it later prevents empty submissions
            -->
            <button>Add Product</button>
        </form>

        <!-- 
            External JavaScript files
            Why two separate files?
            → Separation of concerns: function.js = reusable helpers & render logic
            → app.js = main app flow, event listeners, business logic
            → Easier to read, test, and maintain as project grows
            Why function.js first?
            → renderProducts and createProductDOM must be defined before they are called in app.js
        -->
            <script src="uuid.js"></script>
        <script src="function.js"></script>
        <script src="app.js"></script>
    </body>
</html>
