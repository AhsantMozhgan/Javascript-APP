<!DOCTYPE html>
<html>
    <body>
        <h2>Edit Product</h2>
        <!-- 
            Why <h2>?
            → Clear page purpose — user knows this is for editing an existing product
            → Good heading hierarchy (assuming index.html has <h1>)
        -->

        <!-- Input for editing product title -->
        <input type="text" id="product-title" placeholder="Product Title">
        <!-- 
            Why id="product-title"?
            → Easy to select in JavaScript with querySelector
            Why placeholder?
            → Gives user a hint what to enter → better UX
        -->

        <!-- Input for editing product price -->
        <input type="text" id="product-price" placeholder="Product Price">
        <!-- 
            Why type="text" not type="number"?
            → Simpler for learning — type="number" has spinner/arrows, stricter validation
            → You can change to type="number" later for better UX
            Why id="product-price"?
            → Matches title pattern → consistent naming
        -->

        <!-- 
            Script loading order is important here
            Why uuid.js first?
            → If you later generate or use uuidv4(), it needs to be defined
        -->
        <script src="uuid.js"></script>
        
        <!-- function.js contains getSaveProducts(), saveProducts(), etc. -->
        <script src="function.js"></script>
        
        <!-- edit-product.js contains the logic for this page -->
        <script src="edit-product.js"></script>
    </body>
</html>
