<!DOCTYPE html>
<html>
    <body>
        <h2>Edit Product</h2>
        <!-- 
            Why <h2>?
            → Clearly communicates page purpose: editing an existing product
            → Maintains heading hierarchy (assuming main list page uses <h1>)
        -->

        <!-- Link back to main product list page -->
        <a href="/index.html">Home</a>
        <!-- 
            Why <a> instead of button?
            → Semantic: it's navigation → <a> is correct for links
            → Simple, no extra JS needed
            Why /index.html (absolute path)?
            → Reliable when file is in same folder or subfolder
            → ./index.html would also work — both are fine here
        -->

        <!-- Input for editing product title -->
        <input type="text" id="product-title" placeholder="Product Title">
        <!-- 
            Why id="product-title"?
            → Consistent naming → easy to select in JS
            Why placeholder?
            → Guides user → improves UX even if field is pre-filled
        -->

        <!-- Input for editing product price -->
        <input type="text" id="product-price" placeholder="Product Price">
        <!-- 
            Why type="text" (not type="number")?
            → Simpler for learning phase — avoids spinner UI and strict number validation
            → You can switch to type="number" later for better input control
            Why id="product-price"?
            → Matches title pattern → consistent and predictable
        -->

        <span id="last-edit"></span>

        <!-- Button to delete the current product -->
        <button id="remove-product">Remove</button>
        <!-- 
            Why <button> with id?
            → Clear action label → good UX
            → id allows easy event listener attachment
        -->

        <!-- <script src="moment.js"></script> -->

        <!-- 
            External JavaScript files – order matters!
            Why moment.js from CDN first?
            → app.js uses moment() → must be defined before app.js runs
        -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js" integrity="sha512-4F1cxYdMiAW98oomSLaygEwmCnIP38pb4Kx70yQYqRwLVCs3DbRumfBq82T08g/4LJ/smbFGFpmeFlQgoDccgg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        
        <!-- jalali-moment for Persian (Jalali/Shamsi) calendar support -->
        <!-- Why this library? https://github.com/fingerpich/jalali-moment -->
        <!-- → moment.js doesn't support Persian calendar natively
            → jalali-moment extends moment with fa locale and jalaali methods
            → Perfect for displaying dates in Persian format (e.g. ۱۴۰۴/۱۲/۱۵)
        -->
        <script src="https://unpkg.com/jalali-moment/dist/jalali-moment.browser.js"></script>
        <script src="uuid.js"></script>
        <script src="function.js"></script>
        <script src="edit-product.js"></script>
    </body>
</html>
