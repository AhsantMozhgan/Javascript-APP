<!DOCTYPE html>
<html>
    <title>API</title>
    <!-- Why <title>API</title> ?
        → Simple, clear page title → shown in browser tab
        → Good practice to give meaningful name even for small demos
    -->

    <link rel="stylesheet" href="app2.css">
    <!-- Why <link rel="stylesheet"> ?
        → Loads external CSS file → separates styles from HTML
        → app2.css can contain button/main styles (not shown here)
        → Keeps HTML clean & maintainable
    -->

    <link rel="stylesheet" href="app2.js">
    <!-- Why this line is wrong / ignored?
        → rel="stylesheet" is only for CSS → not for JavaScript
        → Browser ignores it for JS files
        → Correct way: use <script src="app2.js"></script> (you already have it)
        → Safe to remove this line — it does nothing
    -->

    <body>
        <div class="main">
            <!-- Why class="main" ?
                → Likely used in app2.css for centering/styling the container
                → Good semantic name for main content area
            -->

            <button id="get-btn">GET Data</button>
            <!-- Why id="get-btn" ?
                → Unique identifier → easy to select in JS with querySelector
                → Clear button text → user knows it fetches data
            -->

            <button id="post-btn">POST Data</button>
            <!-- Same reason: id for JS, clear label for user -->
        </div>

        <!-- Axios CDN - why here?
            → Loads Axios library → provides axios.get / axios.post
            → Global axios object becomes available for app2.js
            → Very common way to include Axios in small projects
        -->
        <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

        <script src="app2.js"></script>
        <!-- Why <script> at the end of <body> ?
            → DOM is fully loaded when script runs → all elements exist
            → No need for DOMContentLoaded event
            → Best practice for simple pages (performance + reliability)
        -->
    </body>
</html>
